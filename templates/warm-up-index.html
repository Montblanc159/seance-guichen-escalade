{% extends "base.html" %} {% block content %}
<article>
    <p><a href="{{ config.base_url }}"> < Retour</a></p>

    <h1>{{ section.title }}</h1>
    <section class="articles">
        {% for page in section.pages %}
        <div class="articles__item">
            <a href="{{ page.permalink | safe }}"
                >{{ page.date }} - {{ page.title }}</a
            >
        </div>
        {% endfor %}
    </section>
</article>
{% endblock content %}
